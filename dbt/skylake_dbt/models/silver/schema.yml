version: 2

models:
  - name: silver_metar_parsed
    description: >
      Enriched METAR observations with derived categories, flight category
      rankings, surrogate key, and airport metadata join. One row per
      observation per airport. Primary analytical table for weather conditions.
    columns:
      - name: metar_id
        description: Surrogate key — station_id + obs_time (e.g. KJFK_20260313T230000)
        tests:
          - not_null
          - unique
      - name: station_id
        description: ICAO airport code
        tests:
          - not_null
      - name: obs_time
        description: Observation timestamp (UTC)
        tests:
          - not_null
      - name: flt_cat
        description: FAA flight category (VFR, MVFR, IFR, LIFR)
        tests:
          - not_null
          - accepted_values:
              values: ['VFR', 'MVFR', 'IFR', 'LIFR']
      - name: flt_cat_rank
        description: Numeric severity rank (1=VFR, 2=MVFR, 3=IFR, 4=LIFR)
        tests:
          - not_null
      - name: wind_category
        description: Human-readable wind category (CALM, LIGHT, MODERATE, STRONG, GALE)
        tests:
          - not_null
      - name: visibility_category
        description: Human-readable visibility category (CLEAR, GOOD, MODERATE, POOR, VERY_POOR)
        tests:
          - not_null
      - name: ceiling_category
        description: Human-readable ceiling category (HIGH, SCATTERED, BROKEN, LOW, VERY_LOW)
        tests:
          - not_null
      - name: airport_name
        description: Full airport name from airport_metadata seed
      - name: city
        description: City from airport_metadata seed
      - name: state
        description: State from airport_metadata seed
      - name: timezone
        description: IANA timezone from airport_metadata seed

  - name: silver_taf_parsed
    description: >
      TAF forecast periods unnested into individual rows.
      One row per forecast period per TAF bulletin.
      Enables joining forecast periods to actual METAR observations
      for forecast accuracy scoring.
    columns:
      - name: taf_period_id
        description: Surrogate key — station + issue_time + period sequence
        tests:
          - not_null
          - unique
      - name: station_id
        description: ICAO airport code
        tests:
          - not_null
      - name: issue_time
        description: Time the TAF was issued (UTC)
        tests:
          - not_null
      - name: period_sequence
        description: Period number within this TAF (1 = first/initial period)
        tests:
          - not_null
      - name: period_valid_from
        description: Start of this forecast period (UTC timestamp)
        tests:
          - not_null
      - name: period_valid_to
        description: End of this forecast period (UTC timestamp)
        tests:
          - not_null
      - name: forecast_wind_speed_kt
        description: Forecast wind speed in knots for this period
      - name: forecast_visibility_miles
        description: Forecast visibility in statute miles (10.0 = 10+)
